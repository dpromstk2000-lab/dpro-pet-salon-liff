<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DPROペットサロン｜追加機能システム検査</title>
  <style>
    :root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;color:#26221f;background:#f6f1eb}
    *{box-sizing:border-box}body{margin:0;padding:24px}.wrap{max-width:980px;margin:auto}.hero,.panel{background:#fff;border:1px solid #e5d9ce;border-radius:20px;box-shadow:0 10px 28px rgba(70,50,35,.08)}
    .hero{padding:24px;margin-bottom:18px}.hero h1{font-size:28px;margin:0 0 8px}.hero p{font-size:16px;line-height:1.7;margin:0;color:#665d56}.panel{padding:22px;margin-bottom:18px}
    .grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px}label{display:block;font-size:14px;font-weight:700;margin-bottom:6px}input{width:100%;min-height:48px;border:1px solid #cfc2b7;border-radius:12px;padding:10px 12px;font-size:16px}
    .buttons{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}button{border:0;border-radius:12px;padding:13px 18px;font-size:16px;font-weight:800;cursor:pointer;background:#75543d;color:#fff}button.secondary{background:#eee4db;color:#4d3b30}
    .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}.stat{padding:14px;border-radius:14px;background:#f7f3ef}.stat strong{display:block;font-size:26px}.items{display:grid;gap:8px}.item{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border:1px solid #e9dfd7;border-radius:12px}.mark{font-size:20px}.ok{color:#16794b}.ng{color:#b7342c}.detail{font-size:14px;color:#665d56;word-break:break-word}.message{padding:13px;border-radius:12px;background:#f2eee9;font-size:15px;white-space:pre-wrap}.hidden{display:none}
    @media(max-width:760px){body{padding:14px}.grid,.summary{grid-template-columns:1fr}.hero h1{font-size:23px}}
  </style>
</head>
<body>
<div class="wrap">
  <section class="hero"><h1>DPROペットサロン 追加機能システム検査</h1><p>既存の予約・ホテルWorkerには触れず、ペット別施術カルテ、前後写真、ワクチン証明書、受付進捗、JST日付、STEP5確認データAPI、非公開写真保存先を一括検査します。</p></section>
  <section class="panel">
    <div class="grid">
      <div><label for="workerUrl">追加Worker URL</label><input id="workerUrl" value="https://dpro-pet-salon-next-api.dpromstk2000.workers.dev"></div>
      <div><label for="shopCode">Shop Code</label><input id="shopCode" value="pet_salon_demo"></div>
      <div><label for="adminCode">管理コード</label><input id="adminCode" type="password" autocomplete="off"></div>
    </div>
    <div class="buttons"><button id="healthBtn">Worker起動確認</button><button id="checkBtn">一括システム検査</button><button id="clearBtn" class="secondary">管理コードを削除</button></div>
  </section>
  <section id="resultPanel" class="panel hidden"><div id="message" class="message"></div><div id="summary" class="summary"></div><div id="items" class="items"></div></section>
</div>
<script>
const $=id=>document.getElementById(id);
const params=new URLSearchParams(location.search);
if(params.get("demo")==="1") $("adminCode").value="1234";
$("clearBtn").onclick=()=>{$("adminCode").value="";$("adminCode").focus()};
$("healthBtn").onclick=()=>run(false);
$("checkBtn").onclick=()=>run(true);
async function run(full){
  const base=$("workerUrl").value.trim().replace(/\/$/,"");
  const q=new URLSearchParams({shop_code:$("shopCode").value.trim()});
  if(full) q.set("admin_code",$("adminCode").value.trim());
  const path=full?"/api/admin/system-check":"/api/health";
  showMessage("確認中です…");
  try{
    const res=await fetch(`${base}${path}?${q}`);
    const data=await res.json().catch(()=>({}));
    if(!res.ok||data.ok===false) throw new Error(data.error||data.message||`HTTP ${res.status}`);
    render(data,full);
  }catch(error){showMessage(`確認できませんでした。\n${error.message}`,true)}
}
function render(data,full){
  $("resultPanel").classList.remove("hidden");
  $("message").textContent=`${data.service||"DPRO PET SALON"}\n${data.worker_version||""}\nShop: ${data.shop_code||""}`;
  const stats=full?[['合計',data.total],['正常',data.passed],['異常',data.failed],['時間',`${data.elapsed_ms||0}ms`]]:[['Worker','起動中'],['DB',data.database_ok?'接続OK':'未確認'],['方式','追加Worker'],['時間',`${data.elapsed_ms||0}ms`]];
  $("summary").innerHTML=stats.map(([k,v])=>`<div class="stat"><span>${esc(k)}</span><strong>${esc(v??'-')}</strong></div>`).join('');
  $("items").innerHTML=(data.items||[]).map(x=>`<div class="item"><span class="mark ${x.ok?'ok':'ng'}">${x.ok?'✓':'!'}</span><div><strong>${esc(x.key)}</strong><div class="detail">${esc(x.detail||'')}</div></div></div>`).join('');
}
function showMessage(text,error=false){$("resultPanel").classList.remove("hidden");$("message").textContent=text;$("message").style.background=error?'#fff0ef':'#f2eee9';$("summary").innerHTML='';$("items").innerHTML=''}
function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
</script>
</body>
</html>
